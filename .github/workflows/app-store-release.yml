name: App Store Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target to archive
        required: true
        type: choice
        default: all
        options:
          - all
          - mac
          - ios
      export:
        description: Export App Store packages
        required: true
        type: choice
        default: "1"
        options:
          - "0"
          - "1"
      upload:
        description: Upload to App Store Connect
        required: true
        type: choice
        default: "0"
        options:
          - "0"
          - "1"

jobs:
  release:
    name: Archive And Optionally Upload
    runs-on: macos-latest
    environment: app-store
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 When Available
        run: |
          set -euo pipefail
          if [[ -d /Applications/Xcode_26.5.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app
          elif [[ -d /Applications/Xcode_26.0.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi
          xcodebuild -version

      - name: Install Workflow Tools
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

      - name: Install Signing Certificate And Profiles
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MAC_APP_STORE_PROVISION_PROFILE_BASE64: ${{ secrets.MAC_APP_STORE_PROVISION_PROFILE_BASE64 }}
          IOS_APP_STORE_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64" || -z "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Missing signing certificate secrets." >&2
            exit 2
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/apple_distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          install_profile() {
            local encoded="$1"
            local extension="$2"
            local env_name="$3"
            local decoded_path="$RUNNER_TEMP/$env_name.profile"
            local plist_path="$RUNNER_TEMP/$env_name.plist"
            echo -n "$encoded" | base64 --decode -o "$decoded_path"
            security cms -D -i "$decoded_path" > "$plist_path"
            local uuid
            uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist_path")"
            local name
            name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$plist_path")"
            cp "$decoded_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.$extension"
            echo "$env_name=$name" >> "$GITHUB_ENV"
            echo "Installed provisioning profile for $env_name"
          }
          if [[ -n "$MAC_APP_STORE_PROVISION_PROFILE_BASE64" ]]; then
            install_profile "$MAC_APP_STORE_PROVISION_PROFILE_BASE64" "provisionprofile" "MAC_PROVISIONING_PROFILE_SPECIFIER"
          fi
          if [[ -n "$IOS_APP_STORE_PROVISION_PROFILE_BASE64" ]]; then
            install_profile "$IOS_APP_STORE_PROVISION_PROFILE_BASE64" "mobileprovision" "IOS_PROVISIONING_PROFILE_SPECIFIER"
          fi

      - name: Local App Store Checks
        run: |
          set -euo pipefail
          Scripts/test-app-store-connect-readiness.py
          Scripts/test-app-store-connect-bootstrap.py
          Scripts/app-store-connect-readiness.py --dry-run

      - name: Archive And Export
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          TARGET: ${{ inputs.target }}
          EXPORT: ${{ inputs.export }}
          UPLOAD: ${{ inputs.upload }}
          ALLOW_PROVISIONING_UPDATES: "1"
          APP_STORE_REQUIRE_MANUAL_SIGNING: "1"
        run: |
          set -euo pipefail
          if [[ -z "$TEAM_ID" || -z "$ASC_KEY_ID" || -z "$ASC_ISSUER_ID" || -z "$ASC_PRIVATE_KEY" ]]; then
            echo "Missing APPLE_TEAM_ID or App Store Connect API secrets." >&2
            exit 2
          fi
          Scripts/archive-app-store.sh

      - name: Validate App Store Submission Artifacts
        env:
          TARGET: ${{ inputs.target }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          REQUIRE_EXPORTS: ${{ (inputs.export == '1' || inputs.upload == '1') && '1' || '0' }}
        run: |
          set -euo pipefail
          mkdir -p build/ReleaseEvidence/app-store
          Scripts/validate-submission-artifacts.sh --strict --target "$TARGET" \
            | tee build/ReleaseEvidence/app-store/submission-validation.log

      - name: Upload Build Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: app-store-artifacts
          path: |
            build/AppStoreArchives
            build/AppStoreExports
            build/ReleaseEvidence/app-store
          if-no-files-found: ignore

      - name: Clean Up Keychain
        if: ${{ always() }}
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
