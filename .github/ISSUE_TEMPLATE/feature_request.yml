name: Feature request
description: Suggest an improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature ideas are welcome, but the project keeps a focused product direction. Not every request will be accepted.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would make this better?
    validations:
      required: true
  - type: dropdown
    id: app
    attributes:
      label: Affected area
      options:
        - macOS recording
        - iPhone companion
        - Export or recovery
        - Website
        - Build or release pipeline
        - Documentation
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workaround are you using now?
