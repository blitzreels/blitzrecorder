<!DOCTYPE html>
<!--
  BlitzRecorder DMG installer background — DARK hero.
  create-dmg window 660x400, icon-size 128, icons at app(175,185) apps(485,185).
  NOTE: Finder draws icon labels in the system text color (black in Light Mode),
  so this dark version's labels are only readable when the viewer is in Dark Mode.
  Render with Scripts/dmg/render.sh -> background.png / @2x.png.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root { --mint:#17ffa6; --mint-deep:#0bb877; --w:660px; --h:400px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:var(--w); height:var(--h); overflow:hidden;
    font-family:-apple-system,"SF Pro Display","Helvetica Neue",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .stage {
    position:relative; width:var(--w); height:var(--h);
    background:
      radial-gradient(circle at 175px 185px, rgba(23,255,166,0.30), rgba(23,255,166,0) 32%),
      radial-gradient(circle at 175px 185px, rgba(23,255,166,0.10), rgba(23,255,166,0) 48%),
      radial-gradient(circle at 580px 345px, rgba(16,150,124,0.13), rgba(16,150,124,0) 42%),
      radial-gradient(circle at 50% -12%, rgba(255,255,255,0.06), rgba(255,255,255,0) 42%),
      linear-gradient(158deg, #0b0f0d 0%, #060707 100%);
  }
  .vignette { position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 50% 48%, rgba(0,0,0,0) 52%, rgba(0,0,0,0.5) 100%); }
  .grain { position:absolute; inset:0; opacity:0.05; mix-blend-mode:overlay; pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'>\
<filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter>\
<rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
  .brand { position:absolute; top:30px; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:9px; }
  .brand .mark { width:27px; height:27px; object-fit:contain;
    filter:drop-shadow(0 0 11px rgba(23,255,166,0.45)); }
  .brand .name { font-size:24px; font-weight:700; letter-spacing:-0.4px; color:#fff;
    text-shadow:0 0 22px rgba(23,255,166,0.20); }
  .drop { position:absolute; width:150px; height:150px; left:410px; top:110px;
    border-radius:34px; border:1.5px dashed rgba(255,255,255,0.22);
    box-shadow:inset 0 0 30px rgba(23,255,166,0.07); }
  .arrow { position:absolute; left:250px; top:161px; width:160px; height:48px;
    filter:drop-shadow(0 0 9px rgba(23,255,166,0.55)); }
  .caption { position:absolute; bottom:30px; left:0; right:0; text-align:center;
    font-size:13px; font-weight:500; letter-spacing:0.15px; color:rgba(255,255,255,0.52); }
  .caption b { color:rgba(255,255,255,0.78); font-weight:600; }
</style>
</head>
<body>
  <div class="stage">
    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="brand">
      <img class="mark" src="mark.png" alt="" />
      <span class="name">BlitzRecorder</span>
    </div>
    <div class="drop"></div>
    <svg class="arrow" viewBox="0 0 160 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g" x1="0" y1="24" x2="160" y2="24" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#17ffa6" stop-opacity="0.25"/>
        <stop offset="0.55" stop-color="#17ffa6"/><stop offset="1" stop-color="#17ffa6"/>
      </linearGradient></defs>
      <path d="M6 24 H136" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
      <path d="M124 12 L150 24 L124 36" stroke="#17ffa6" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <div class="caption">Drag <b>BlitzRecorder</b> onto <b>Applications</b> to install</div>
  </div>
</body>
</html>
